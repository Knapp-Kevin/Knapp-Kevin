name: 3D contribution graph

on:
  schedule:
    - cron: "30 6 * * *"   # daily, 06:30 UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contribution graph
        # This action reads USERNAME and GITHUB_TOKEN from env (no `with:` inputs).
        # Output lands in ./profile-3d-contrib/ ; the README references
        # profile-night-view.svg (dark, blue-toned). Other variants exist
        # (profile-green-animate, profile-gitblock, profile-season-animate).
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          # Default Actions token. NOTE: tried the METRICS_TOKEN PAT to fold in private
          # contributions, but this action's GraphQL `user` query returns null with that
          # token ("Cannot read properties of null (reading 'repositories')") — it needs a
          # classic PAT with read:user. The default token works and captures public org
          # contributions, which is the bulk of it.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit rendered SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d-contrib
          git commit -m "chore: refresh 3D contribution graph" || echo "no changes"
          git push
