name: Metrics

on:
  # Manual only until commit-email attribution is fixed (otherwise it renders
  # "No push activity found"). See the note in README.md.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Render metrics panel
        uses: lowlighter/metrics@latest
        with:
          # Create a classic Personal Access Token with scopes: public_repo, read:user, read:org
          # and add it as a repo secret named METRICS_TOKEN.
          token: ${{ secrets.METRICS_TOKEN }}
          user: Knapp-Kevin
          filename: github-metrics.svg
          template: classic
          config_timezone: America/Chicago   # adjust to your timezone

          # No vanity header: 0 owned stars would misrepresent the work.
          base: ""

          # Languages by COMMIT analysis (not file size), including the forked
          # repos where most of the Python governance work actually lives. This
          # is the whole reason github-readme-stats was dropped from the README.
          plugin_languages: yes
          plugin_languages_analysis: yes
          plugin_languages_sections: most-used, recently-used
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_ignored: html, css, scss, jupyter notebook

          # Lines of code changed
          plugin_lines: yes

          # Coding habits / active hours
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_from: 200
