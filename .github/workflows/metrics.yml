name: Metrics

on:
  schedule:
    - cron: "0 6 * * *"   # daily, 06:00 UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Render metrics panel
        uses: lowlighter/metrics@latest
        with:
          # Create a classic Personal Access Token with scopes: public_repo, read:user, read:org
          # and add it as a repo secret named METRICS_TOKEN.
          token: ${{ secrets.METRICS_TOKEN }}
          user: Knapp-Kevin
          filename: github-metrics.svg
          template: classic

          # Monolith Ledger look: dark canvas, deep-blue accents.
          config_timezone: America/Chicago   # adjust to your timezone
          base: header, activity, community, repositories, metadata

          # Languages worked in
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          # Lines of code changed
          plugin_lines: yes

          # Coding habits / active hours
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
