name: Metrics

on:
  schedule:
    - cron: "0 6 * * *"   # daily, 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Render metrics panel
        uses: lowlighter/metrics@latest
        with:
          # Classic PAT with scopes: repo, read:org, read:user. Stored as METRICS_TOKEN.
          token: ${{ secrets.METRICS_TOKEN }}
          user: Knapp-Kevin
          filename: github-metrics.svg
          template: classic
          config_timezone: America/Chicago   # adjust to your timezone

          # Aggregate across owned AND org repos (MythologIQ-Labs-LLC, BicameralAI),
          # so stars, languages, and activity reflect the real footprint.
          repositories: 200
          repositories_affiliations: owner, collaborator, organization_member

          # Attribute commits authored under any of Kevin's identities. Without this,
          # fork/org commits authored under a non-account email/name are not credited
          # and the language panel renders empty ("No push activity found").
          commits_authoring: krknapp@gmail.com, admin@mythologiq.studio, MythologIQ, Kevin Knapp, Knapp-Kevin, WulfForge

          # Header carries the org-inclusive star / repo / contribution totals.
          base: header

          # Languages aggregated across the in-scope repos (owned + org). This reads
          # each repo's reported languages, so the org source repos (FailSafe=TS,
          # Qor-logic/bicameral=Python, bicameral-bot=Rust) drive the real breakdown.
          # NOTE: indepth/commit-analysis is intentionally NOT used — it needs the
          # github-linguist dependency that isn't on the runner and renders "0 Languages".
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_ignored: html, css, scss, jupyter notebook

          # Lines of code changed
          plugin_lines: yes

          # Coding habits / active hours
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_from: 200
